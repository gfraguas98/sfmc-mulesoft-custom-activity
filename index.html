<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script src="https://unpkg.com/postmonger@0.0.18/postmonger.js"></script>
</head>

<body>

<h2>MuleSoft Cancellation</h2>
<p>Custom Activity Ready</p>

<script>

var connection = new Postmonger.Session();
var payload = {};

connection.on('initActivity', initialize);

$(window).ready(onRender);

function onRender() {

    connection.trigger('ready');

    connection.trigger('updateButton', {
        button: 'done',
        enabled: true
    });
}

function initialize(data) {

    if (data) {
        payload = data;
    }
}

connection.on('clickedDone', function () {

    payload['arguments'] =
        payload['arguments'] || {};

    payload['metaData'] =
        payload['metaData'] || {};

    payload.metaData.isConfigured = true;

    connection.trigger(
        'updateActivity',
        payload
    );
});

</script>

</body>
</html>
